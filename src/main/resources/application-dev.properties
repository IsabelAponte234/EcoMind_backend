server.port=8092
spring.datasource.url=jdbc:postgresql://localhost:5432/ecomind
spring.datasource.username=postgres
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Culqi payment gateway (test mode). The secret key is read from the
# CULQI_SECRET_KEY environment variable so it is never committed to git.
culqi.api.base-url=https://api.culqi.com/v2
culqi.api.secret-key=${CULQI_SECRET_KEY:}
