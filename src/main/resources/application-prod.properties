server.port=${PORT:8092}
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ecomind}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:12345678}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Culqi payment gateway. Secret key comes from the CULQI_SECRET_KEY env var.
culqi.api.base-url=${CULQI_BASE_URL:https://api.culqi.com/v2}
culqi.api.secret-key=${CULQI_SECRET_KEY:}

# PayPal payment gateway. Credentials come from environment variables.
paypal.api.base-url=${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
paypal.api.client-id=${PAYPAL_CLIENT_ID:}
paypal.api.secret=${PAYPAL_SECRET:}
